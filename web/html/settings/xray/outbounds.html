{{define "settings/xray/outbounds"}}
<a-space direction="vertical" size="middle">
    <a-row>
        <a-col :xs="12" :sm="12" :lg="12">
            <a-space direction="horizontal" size="small">
                <a-button type="primary" icon="plus" @click="addOutbound">
                    <span v-if="!isMobile">{{ i18n
                        "pages.xray.outbound.addOutbound" }}</span>
                </a-button>
                <a-button type="primary" icon="cloud"
                    @click="showWarp()">WARP</a-button>
                <a-button
                    type="primary"
                    icon="thunderbolt"
                    @click="testAllOutbounds"
                    :loading="batchTesting"
                    :disabled="batchTesting">
                    <span v-if="!batchTesting">{{ i18n "pages.xray.outbound.testAll" }}</span>
                    <span v-else>[[ batchTestProgressPercent ]]%</span>
                </a-button>
            </a-space>
        </a-col>
        <a-col :xs="12" :sm="12" :lg="12" :style="{ textAlign: 'right' }">
            <a-space direction="horizontal" size="small">
                <a-input
                    v-model="outboundSearchText"
                    :placeholder="searchPlaceholder"
                    allow-clear
                    style="width: 200px;"
                    @change="onOutboundSearch">
                    <a-icon slot="prefix" type="search" />
                </a-input>
                <a-button-group>
                    <a-button icon="sync" @click="refreshOutboundTraffic()"
                        :loading="refreshing"></a-button>
                    <a-popconfirm placement="topRight"
                        @confirm="resetOutboundTraffic(-1)"
                        title='{{ i18n "pages.inbounds.resetTrafficContent"}}'
                        :overlay-class-name="themeSwitcher.currentTheme"
                        ok-text='{{ i18n "reset"}}'
                        cancel-text='{{ i18n "cancel"}}'>
                        <a-icon slot="icon" type="question-circle-o"
                            :style="{ color: themeSwitcher.isDarkTheme ? '#008771' : '#008771' }"></a-icon>
                        <a-button icon="retweet"></a-button>
                    </a-popconfirm>
                </a-button-group>
            </a-space>
        </a-col>
    </a-row>
    <a-alert
        v-if="batchTesting"
        type="info"
        show-icon
        style="margin-bottom: 16px;">
        <template slot="message">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div style="flex: 1;">
                    <span>{{ i18n "pages.xray.outbound.testingAll" }}</span>
                    <div style="margin-top: 8px; font-size: 12px; color: #666;">
                        <span>Task ID: [[ batchTaskId ]]</span>
                    </div>
                    <a-progress
                        :percent="batchTestProgressPercent"
                        :status="batchTestStatus"
                        :format="() => `${batchTestProgress.current}/${batchTestProgress.total} (${batchTestProgressPercent}%)`"
                        style="margin-top: 8px;" />
                </div>
                <a-button
                    type="danger"
                    size="small"
                    @click="stopBatchTest"
                    style="margin-left: 16px;">
                    <a-icon type="stop" />
                    <span v-if="!isMobile">{{ i18n "pages.xray.outbound.stopTest" }}</span>
                </a-button>
            </div>
        </template>
    </a-alert>
    <a-alert
        v-if="batchTestResults"
        type="success"
        show-icon
        closable
        @close="clearBatchTestResults"
        style="margin-bottom: 16px;">
        <template slot="message">
            <div>{{ i18n "pages.xray.outbound.testComplete" }}</div>
            <a-statistic-group style="margin-top: 8px;">
                <a-statistic :title="i18n('pages.xray.outbound.testTotal')" :value="batchTestResults.total" />
                <a-statistic :title="i18n('pages.xray.outbound.testSuccessCount')" :value="batchTestResults.successCount" :value-style="{ color: '#52c41a' }" />
                <a-statistic :title="i18n('pages.xray.outbound.testFailedCount')" :value="batchTestResults.failedCount" :value-style="{ color: '#f5222d' }" />
                <a-statistic :title="i18n('pages.xray.outbound.testTime')" :value="batchTestResults.totalTime" suffix="ms" />
            </a-statistic-group>
        </template>
    </a-alert>
    <a-table :columns="outboundColumns" bordered :row-key="r => r.key"
        :data-source="outboundData"
        :scroll="isMobile ? {} : { x: 800 }" :pagination="outboundPagination"
        :indent-size="0"
        :locale='{ filterConfirm: `{{ i18n "confirm" }}`, filterReset: `{{ i18n "reset" }}` }'
        :loading="refreshing">
        <template slot="action" slot-scope="text, outbound, index">
            <span>[[ index+1 ]]</span>
            <a-dropdown :trigger="['click']">
                <a-icon @click="e => e.preventDefault()" type="more"
                    :style="{ fontSize: '16px', textDecoration: 'bold' }"></a-icon>
                <a-menu slot="overlay" :theme="themeSwitcher.currentTheme">
                    <a-menu-item v-if="index>0"
                        @click="setFirstOutbound(index)">
                        <a-icon type="vertical-align-top"></a-icon>
                        <span>{{ i18n "pages.xray.rules.first"}}</span>
                    </a-menu-item>
                    <a-menu-item @click="editOutbound(index)">
                        <a-icon type="edit"></a-icon>
                        <span>{{ i18n "edit" }}</span>
                    </a-menu-item>
                    <a-menu-item @click="resetOutboundTraffic(index)">
                        <span>
                            <a-icon type="retweet"></a-icon>
                            <span>{{ i18n "pages.inbounds.resetTraffic"}}</span>
                        </span>
                    </a-menu-item>
                    <a-menu-item @click="deleteOutbound(index)">
                        <span :style="{ color: '#FF4D4F' }">
                            <a-icon type="delete"></a-icon>
                            <span>{{ i18n "delete"}}</span>
                        </span>
                    </a-menu-item>
                </a-menu>
            </a-dropdown>
        </template>
        <template slot="address" slot-scope="text, outbound, index">
            <p :style="{ margin: '0 5px' }"
                v-for="addr in findOutboundAddress(outbound)">[[ addr ]]</p>
        </template>
        <template slot="protocol" slot-scope="text, outbound, index">
            <a-tag :style="{ margin: '0' }" color="purple">[[ outbound.protocol
                ]]</a-tag>
            <template
                v-if="[Protocols.VMess, Protocols.VLESS, Protocols.Trojan, Protocols.Shadowsocks].includes(outbound.protocol)">
                <a-tag :style="{ margin: '0' }" color="blue">[[
                    outbound.streamSettings.network ]]</a-tag>
                <a-tag :style="{ margin: '0' }"
                    v-if="outbound.streamSettings.security=='tls'"
                    color="green">tls</a-tag>
                <a-tag :style="{ margin: '0' }"
                    v-if="outbound.streamSettings.security=='reality'"
                    color="green">reality</a-tag>
            </template>
        </template>
        <template slot="traffic" slot-scope="text, outbound, index">
            <a-tag color="green">[[ findOutboundTraffic(outbound) ]]</a-tag>
        </template>
        <template slot="test" slot-scope="text, outbound, index">
            <a-tooltip>
                <template slot="title">{{ i18n "pages.xray.outbound.test"
                    }}</template>
                <a-button
                    type="primary"
                    shape="circle"
                    icon="thunderbolt"
                    :loading="outboundTestStates[outbound.originalIndex] && outboundTestStates[outbound.originalIndex].testing"
                    @click="testOutbound(index)"
                    :disabled="(outbound.protocol === 'blackhole' || outbound.tag === 'blocked') || (outboundTestStates[outbound.originalIndex] && outboundTestStates[outbound.originalIndex].testing)">
                </a-button>
            </a-tooltip>
        </template>
        <template slot="testResult" slot-scope="text, outbound, index">
            <div
                v-if="outboundTestStates[outbound.originalIndex] && outboundTestStates[outbound.originalIndex].result">
                <a-tag v-if="outboundTestStates[outbound.originalIndex].result.success"
                    color="green">
                    [[ outboundTestStates[outbound.originalIndex].result.delay ]]ms
                    <span v-if="outboundTestStates[outbound.originalIndex].result.statusCode">
                        ([[ outboundTestStates[outbound.originalIndex].result.statusCode
                        ]])</span>
                </a-tag>
                <a-tooltip v-else
                    :title="outboundTestStates[outbound.originalIndex].result.error">
                    <a-tag color="red">
                        Failed
                    </a-tag>
                </a-tooltip>
            </div>
            <span
                v-else-if="outboundTestStates[outbound.originalIndex] && outboundTestStates[outbound.originalIndex].testing">
                <a-icon type="loading" />
            </span>
            <span v-else>-</span>
        </template>
    </a-table>
</a-space>
{{end}}
