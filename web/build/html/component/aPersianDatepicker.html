{{define "component/persianDatepickerTemplate"}}
<template>
    <div>
        <a-input :value="value" type="text" v-model="date" data-jdp class="persian-datepicker"
            @input="$emit('input', convertToGregorian($event.target.value)); jalaliDatepicker.hide();"
            :placeholder="placeholder">
            <template #addonAfter>
                <a-icon type="calendar" :style="{ fontSize: '14px', opacity: '0.5' }" />
            </template>
        </a-input>
    </div>
</template>
{{end}}

{{define "component/aPersianDatepicker"}}
<link rel="stylesheet" href="{{ .base_path }}assets/persian-datepicker/persian-datepicker.min.c683c73ab166f7f03847ac816fe640e4188fb0aae227a96cc535bf7e5a45da357c7b9df5b2fc738cf37bc4a98701418d71e08caf2906f639c1965b32835f74cb.css?{{ .cur_ver }}" />
<script src="{{ .base_path }}assets/moment/moment-jalali.min.ae257ad6dbb1ff4651721943f7b464b37b6b7210597c1ae1112f83fd0698783e88a60ee70895dd19df2fa8d6908e116b135e1ebbc5de86bc293ad39a28926268.js?{{ .cur_ver }}"></script>
<script src="{{ .base_path }}assets/persian-datepicker/persian-datepicker.min.a1b6e85c1d6b5b807e6e3e56bc4c2afa0dd85b0f438342d342433f1907a4a92a39d5669cd17f9a20e8ab30bdfa3468861471b4b16bafb63eeba4ee411f8599d8.js?{{ .cur_ver }}"></script>
<script>
    const persianDatepicker = {};

    Vue.component('a-persian-datepicker', {
        props: {
            'format': {
                type: undefined,
                required: false,
            },
            'value': {
                type: String,
                required: false,
            },
            'placeholder': {
                type: String,
                required: false,
            },
        },
        template: `{{template "component/persianDatepickerTemplate"}}`,
        data() {
            return {
                date: '',
                persianDatepicker,
            };
        },
        watch: {
            value: function (date) {
                this.date = this.convertToJalalian(date)
            }
        },
        mounted() {
            this.date = this.convertToJalalian(this.value)
            this.listenToDatepicker()
        },
        methods: {
            convertToGregorian(date) {
                return date ? moment(moment(date, 'jYYYY/jMM/jDD HH:mm:ss').format('YYYY-MM-DD HH:mm:ss')) : null
            },
            convertToJalalian(date) {
                return date && moment.isMoment(date) ? date.format('jYYYY/jMM/jDD HH:mm:ss') : null
            },
            listenToDatepicker() {
                jalaliDatepicker.startWatch({
                    time: true,
                    zIndex: '9999',
                    hideAfterChange: true,
                    useDropDownYears: false,
                    changeMonthRotateYear: true,
                });
            },
        }
    });
</script>
{{end}}
